# Docker Compose moderno - No se requiere el campo 'version'
services:
  # Base de datos PostgreSQL - contenedor persistente con volumen propio
  db:
    image: postgres:16-alpine
    container_name: libros_db
    environment:
      - POSTGRES_USER=libros_user
      - POSTGRES_PASSWORD=libros_pass
      - POSTGRES_DB=libros_db
    volumes:
      - libros_data:/var/lib/postgresql/data # monta el volumen con nombre en la ruta real de Postgres
    networks:
      - libros_net

networks:
  # Red propia: permite que los contenedores se llamen por nombre (DNS interno)
  libros_net:
    driver: bridge

volumes:
  # Volumen con nombre: persiste los datos aunque se borre el contenedor
  libros_data:
    name: libros_data_volume
